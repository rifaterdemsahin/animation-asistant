<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Animation Assistant — Test</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <div id="topnav"></div>
  <header id="app-header"></header>

  <main class="page">
    <h1>🧪 Test Runner</h1>
    <p class="lede">Run each generation step against an existing project to catch errors.</p>

    <div class="form">
      <label>Project slug
        <input type="text" id="test-slug" placeholder="e.g. why-sleep-matters" required>
      </label>
      <p class="muted">Create one at <a href="/pages/projects.html">📁 Projects</a> first.</p>
    </div>

    <div class="row" style="margin-top:12px;gap:6px;flex-wrap:wrap">
      <button id="show-prompts" class="btn">👁️ Show All Prompts</button>
    </div>
    <pre id="prompts-display" class="out hidden muted" style="font-size:12px;max-height:200px;overflow:auto"></pre>

    <div class="row" style="margin-top:8px;gap:6px;flex-wrap:wrap">
      <button id="test-outline" class="btn">📝 Outline</button>
      <button id="test-script" class="btn">📜 Script</button>
      <button id="test-components" class="btn">🖼️ Components</button>
      <button id="test-voiceover" class="btn">🎙️ Voiceover</button>
      <button id="test-music" class="btn">🎵 Music</button>
      <button id="test-sfx" class="btn">🔉 SFX</button>
      <button id="test-storyboard" class="btn">📋 Storyboard</button>
      <button id="test-all" class="btn primary">⚡ Run All</button>
    </div>

    <div id="results" style="margin-top:16px"></div>
  </main>

  <footer id="app-footer"></footer>
  <script src="/assets/js/layout.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/debug.js"></script>
  <script src="/assets/js/test.js"></script>
</body>
</html>
