# fly.io app definition for the Go backend.
# App name may need to be unique on fly.io — rename if taken.
app = "animation-assistant"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
