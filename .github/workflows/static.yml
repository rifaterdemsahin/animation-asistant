# GitHub Pages: serves a single redirect page to the fly.io app.
# (The app itself is deployed to fly.io; Pages just forwards there.)
name: Deploy redirect to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build redirect page
        run: |
          mkdir -p site
          printf '%s\n' \
            '<!doctype html>' \
            '<html lang="en"><head><meta charset="utf-8">' \
            '<meta http-equiv="refresh" content="0; url=https://animation-assistant.fly.dev/">' \
            '<title>Animation Assistant</title></head>' \
            '<body>Redirecting to <a href="https://animation-assistant.fly.dev/">Animation Assistant</a>.</body></html>' \
            > site/index.html
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
