<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Assistant — Markdown Renderer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- PrismJS for code blocks -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css">

  <!-- Shared debug overlay menu styles -->
  <link rel="stylesheet" href="web/assets/css/debug-menu.css">

  <style>
    :root {
      --bg-dark: #0b0f19;
      --bg-card: rgba(22, 28, 45, 0.7);
      --bg-glass: rgba(15, 23, 42, 0.6);
      --border-color: rgba(255, 255, 255, 0.08);
      --border-glow: rgba(139, 92, 246, 0.2);
      --text-primary: #f8fafc;
      --text-muted: #94a3b8;
      --accent-violet: #8b5cf6;
      --accent-cyan: #06b6d4;
      --font-display: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'Fira Code', monospace;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      background-image: radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.1) 0px, transparent 50%);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height: 100vh;
      line-height: 1.7;
    }

    .renderer-header {
      backdrop-filter: blur(12px);
      background-color: var(--bg-glass);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0.75rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 500;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .back-btn:hover {
      color: var(--accent-cyan);
      transform: translateX(-2px);
    }

    .file-path-badge {
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--accent-violet);
    }

    .content-container {
      max-width: 900px;
      margin: 3rem auto 6rem auto;
      padding: 0 2rem;
    }

    /* Markdown Styling */
    .markdown-body {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 3rem;
      backdrop-filter: blur(16px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
      font-family: var(--font-display);
      font-weight: 600;
      margin-top: 2rem;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    .markdown-body h1 {
      font-size: 2.25rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.5rem;
      margin-top: 0;
    }

    .markdown-body h2 {
      font-size: 1.6rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.3rem;
    }

    .markdown-body h3 {
      font-size: 1.25rem;
    }

    .markdown-body p {
      margin-bottom: 1.2rem;
      color: #cbd5e1;
    }

    .markdown-body ul, .markdown-body ol {
      margin-bottom: 1.2rem;
      padding-left: 2rem;
      color: #cbd5e1;
    }

    .markdown-body li {
      margin-bottom: 0.4rem;
    }

    .markdown-body code {
      font-family: var(--font-mono);
      background-color: rgba(255, 255, 255, 0.08);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
      color: #e2e8f0;
    }

    .markdown-body pre {
      margin-bottom: 1.5rem;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      overflow-x: auto;
    }

    .markdown-body pre code {
      background-color: transparent;
      padding: 0;
      border-radius: 0;
      color: inherit;
      display: block;
    }

    .markdown-body blockquote {
      border-left: 4px solid var(--accent-violet);
      padding: 0.75rem 1.5rem;
      background-color: rgba(139, 92, 246, 0.05);
      border-radius: 0 8px 8px 0;
      margin-bottom: 1.5rem;
      color: #cbd5e1;
    }

    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
    }

    .markdown-body th, .markdown-body td {
      border: 1px solid var(--border-color);
      padding: 0.75rem 1rem;
      text-align: left;
    }

    .markdown-body th {
      background-color: rgba(255, 255, 255, 0.05);
      font-weight: 600;
    }

    .markdown-body tr:nth-child(even) {
      background-color: rgba(255, 255, 255, 0.02);
    }

    .error-container {
      text-align: center;
      padding: 3rem 0;
    }

    .error-icon {
      font-size: 4rem;
      color: var(--accent-violet);
      margin-bottom: 1.5rem;
    }

    @media (max-width: 480px) {
      .markdown-body {
        padding: 1.5rem;
      }
    }

    .edit-github-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, var(--accent-violet), var(--accent-cyan));
      border: none;
      color: white;
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      transition: var(--transition);
      cursor: pointer;
    }

    .edit-github-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
      color: white;
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <header class="renderer-header">
    <div class="header-container">
      <a href="index.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Home</span>
      </a>
      <div style="display: flex; align-items: center; gap: 1rem;">
        <span class="file-path-badge" id="filePath">loading...</span>
        <a href="#" target="_blank" class="edit-github-btn" id="editGitHubBtn" style="display: none;">
          <i class="fa-solid fa-pen"></i>
          <span>Edit on GitHub</span>
        </a>
      </div>
    </div>
  </header>

  <main class="content-container">
    <article class="markdown-body" id="content">
      <div style="text-align: center; padding: 2rem;">
        <i class="fa-solid fa-spinner fa-spin" style="font-size: 2rem; color: var(--accent-cyan);"></i>
        <p style="margin-top: 1rem; color: var(--text-muted);">Parsing document...</p>
      </div>
    </article>
  </main>

  <!-- Floating Debug Menu -->
  <button class="debug-toggle-btn" id="debugToggle">
    <i class="fa-solid fa-bug"></i>
  </button>

  <div class="debug-menu-overlay" id="debugMenuOverlay">
    <div class="debug-menu-header">
      <h2 class="debug-menu-title"><i class="fa-solid fa-terminal"></i> Debug Menu</h2>
      <button id="debugClose" style="background:none; border:none; color:white; cursor:pointer;"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <!-- Search Box with Autocomplete -->
    <div class="search-wrapper" style="position: relative; margin-bottom: 1.5rem;">
      <i class="fa-solid fa-magnifying-glass search-icon" style="position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
      <input type="text" class="search-input" id="debugSearch" placeholder="Search stages or agents..." style="width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; background-color: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); border-radius: 8px; color: white; font-family: var(--font-body); outline: none; transition: var(--transition);">
    </div>
    <ul class="debug-links-list" id="debugLinksList"></ul>
  </div>

  <!-- Marked Markdown Parser CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
  <!-- PrismJS CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <!-- Mermaid.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.2.4/mermaid.min.js"></script>

  <script src="web/assets/js/debug-menu.js"></script>
  <script>
    // Markdown rendering and Mermaid setup
    document.addEventListener("DOMContentLoaded", function () {
      var editGitHubBtn = document.getElementById("editGitHubBtn");

      // Fetch and Parse Markdown File
      var urlParams = new URLSearchParams(window.location.search);
      var filePath = urlParams.get("file") || "README.md";

      // Sanity check to append README.md if directory is provided
      var fetchPath = filePath;
      if (fetchPath.endsWith("/")) {
        fetchPath += "README.md";
      }
      window.debugLog("Parsing query string. Target file: \"" + filePath + "\", Fetch path: \"" + fetchPath + "\"");

      document.getElementById("filePath").textContent = fetchPath;
      document.title = "\uD83D\uDCC4 " + fetchPath.split("/").pop();

      // Show and configure Edit on GitHub button
      var gitHubEditUrl = "https://github.com/rifaterdemsahin/animation-asistant/edit/main/" + fetchPath;
      editGitHubBtn.href = gitHubEditUrl;
      editGitHubBtn.style.display = "inline-flex";
      window.debugLog("Edit on GitHub URL configured:", gitHubEditUrl);

      window.debugLog("Fetching markdown file from: \"" + fetchPath + "\"");
      fetch(fetchPath)
        .then(function (response) {
          if (!response.ok) throw new Error("File not found");
          window.debugLog("Fetched file \"" + fetchPath + "\" successfully. Status: " + response.status);
          return response.text();
        })
        .then(function (text) {
          window.debugLog("Parsing markdown content (" + text.length + " characters)");
          // Parse Markdown
          var contentDiv = document.getElementById("content");
          contentDiv.innerHTML = marked.parse(text);

          window.debugLog("Applying syntax highlighting via PrismJS...");
          // Prism syntax highlighting
          Prism.highlightAllUnder(contentDiv);

          window.debugLog("Initializing Mermaid rendering...");
          // Mermaid setup
          mermaid.initialize({ startOnLoad: true, theme: "dark" });
          mermaid.run();
        })
        .catch(function (err) {
          console.error("[Debug Mode] Error rendering markdown:", err);
          document.getElementById("content").innerHTML =
            "<div class=\"error-container\">" +
            "<i class=\"fa-solid fa-circle-exclamation error-icon\"></i>" +
            "<h2>Unable to load file</h2>" +
            "<p style=\"color: var(--text-muted); margin-top: 0.5rem;\">" + err.message + ": " + fetchPath + "</p>" +
            "<a href=\"index.html\" style=\"display:inline-block; margin-top:1.5rem; color:var(--accent-cyan); text-decoration:underline;\">Return to Home</a>" +
            "</div>";
        });
    });
  </script>
</body>
</html>
